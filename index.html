<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Liczniki</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
:root{--bg:#0d0f0e;--sf:#161a17;--sf2:#1e2420;--ac:#4ade80;--ac2:#22c55e;--tx:#e2e8f0;--tx2:#94a3b8;--bd:#2d3748;--red:#f87171;--yw:#fbbf24;--bl:#60a5fa;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;max-width:500px;margin:0 auto;padding-bottom:80px;}
header{padding:14px 20px 10px;border-bottom:1px solid var(--bd);background:var(--sf);position:sticky;top:0;z-index:100;}
header h1{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--ac);letter-spacing:.15em;text-transform:uppercase;}
header p{font-size:10px;color:var(--tx2);margin-top:2px;font-family:'IBM Plex Mono',monospace;}
.tabs{display:flex;background:var(--sf);border-bottom:1px solid var(--bd);}
.tab{flex:1;padding:10px 4px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.tab.active{color:var(--ac);border-bottom-color:var(--ac);}
.house-bar{display:flex;gap:6px;padding:10px 14px;background:var(--sf2);border-bottom:1px solid var(--bd);overflow-x:auto;}
.hbtn{flex-shrink:0;padding:5px 13px;border-radius:20px;border:1px solid var(--bd);background:var(--sf);color:var(--tx2);font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.hbtn.active{background:var(--ac);color:#0d1f14;border-color:var(--ac);font-weight:600;}
.sec{padding:14px 16px;}
.stitle{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--tx2);text-transform:uppercase;margin-bottom:10px;}
.chip{display:inline-flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:2px 8px;border-radius:20px;background:var(--sf2);color:var(--tx2);border:1px solid var(--bd);margin-bottom:12px;}
.chip b{color:var(--ac);}
.mcard{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:7px;cursor:pointer;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;transition:border-color .15s,background .15s;}
.mcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#4a5568;}
.mcard.sel{border-color:var(--ac);background:#0f2318;}.mcard.sel::before{background:var(--ac);}
.mcard.done{border-color:#1e4d2b;}.mcard.done::before{background:var(--ac2);}
.mi{width:34px;height:34px;background:var(--sf2);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;}
.mcard.done .mi{background:#0f2318;}
.minfo{flex:1;min-width:0;}
.mkw{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;}
.mser{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx2);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mbadge{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:2px 7px;border-radius:6px;background:var(--sf2);color:var(--tx2);flex-shrink:0;text-align:right;}
.mcard.done .mbadge{background:#0f2318;color:var(--ac);}
.mbadges{display:flex;flex-direction:column;gap:3px;flex-shrink:0;}
.wbadge{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:2px 6px;border-radius:5px;background:var(--sf2);color:var(--tx2);white-space:nowrap;}
.wbadge.ok{background:#0f2318;color:var(--ac);}
.cpanel{display:none;background:var(--sf);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-top:10px;}
.cpanel.vis{display:block;}
.chdr{padding:9px 13px;border-bottom:1px solid var(--bd);font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ac);}
.cbody{padding:12px;display:flex;flex-direction:column;gap:9px;}
.photo-area{width:100%;height:140px;background:var(--sf2);border:2px dashed var(--bd);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s;}
.photo-area:active{border-color:var(--ac);}
.photo-area.hp{border-style:solid;border-color:var(--ac2);}
.photo-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.photo-area .ov{position:relative;z-index:2;text-align:center;}
.photo-area .ov span{display:block;font-size:24px;line-height:1;}
.photo-area .ov p{font-size:11px;color:var(--tx2);margin-top:5px;}
.photo-area.hp .ov p{color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9);font-weight:500;}
.ocr-section{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:10px;}
.ocr-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
.ocr-row{display:flex;align-items:center;gap:7px;}
.oval{flex:1;padding:9px 10px;border-radius:7px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;text-align:center;width:100%;-webkit-appearance:none;}
.oval:focus{outline:none;border-color:var(--ac);}
.ounit{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--tx2);white-space:nowrap;}
.ost{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:6px 9px;border-radius:6px;margin-top:7px;text-align:center;display:none;}
.ost.vis{display:block;}
.ost.scan{background:#3d2f0a;color:var(--yw);}
.ost.ok{background:#0f2318;color:var(--ac);}
.ost.err{background:#2d1212;color:var(--red);}
.wlbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;margin-top:8px;}
.wlbl.zim{color:#4ade80;}.wlbl.cie{color:var(--bl);}
.row{display:flex;gap:7px;}
.btn{flex:1;padding:11px;border-radius:8px;border:1px solid var(--bd);background:var(--sf2);color:var(--tx);font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;text-align:center;transition:all .15s;-webkit-appearance:none;display:block;width:100%;}
.btn:active{transform:scale(.97);}
.btn-g{background:var(--ac);color:#0d1f14;border-color:var(--ac);font-weight:600;}
.btn-g:active{background:var(--ac2);}
.btn-g:disabled{opacity:.4;pointer-events:none;}
.btn-r{border-color:#4a1c1c;color:var(--red);}
.btn-bl{background:var(--bl);color:#0d1428;border-color:var(--bl);font-weight:600;}

/* Saved archives */
.arc-card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.arc-icon{font-size:22px;flex-shrink:0;}
.arc-info{flex:1;min-width:0;}
.arc-name{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--tx);}
.arc-date{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx2);margin-top:2px;}
.arc-size{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx2);}
.arc-actions{display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.arc-btn{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:5px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--sf2);color:var(--tx);cursor:pointer;white-space:nowrap;}
.arc-btn.dl{background:var(--ac);color:#0d1f14;border-color:var(--ac);font-weight:600;}
.arc-btn.del{color:var(--red);border-color:#4a1c1c;}

.empty-state{text-align:center;padding:40px 20px;color:var(--tx2);font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:2;}

.spanel{display:none;padding:14px 16px;}
.spanel.vis{display:block;}
.smsg{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:10px 12px;border-radius:8px;text-align:center;display:none;margin-top:9px;line-height:1.6;white-space:pre-line;}
.smsg.vis{display:block;}
.smsg.ok{background:#0f2318;color:var(--ac);border:1px solid #1e4d2b;}
.smsg.err{background:#2d1212;color:var(--red);border:1px solid #4a1c1c;}
.smsg.info{background:#3d2f0a;color:var(--yw);border:1px solid #5a4510;}

.botnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:var(--sf);border-top:1px solid var(--bd);display:flex;z-index:200;}
.bnbtn{flex:1;padding:12px 4px 10px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx2);cursor:pointer;transition:color .15s;border:none;background:none;}
.bnbtn .bnico{font-size:18px;display:block;margin-bottom:2px;}
.bnbtn.active{color:var(--ac);}
.bnbtn .cnt{display:inline-block;background:var(--ac2);color:#0d1f14;font-size:8px;font-weight:600;padding:1px 4px;border-radius:10px;margin-left:2px;}
</style>
</head>
<body>
<header>
  <h1>⚡ Liczniki — Blok 21/19/17/15</h1>
  <p id="hdate"></p>
</header>

<input type="file" id="fileinput" accept="image/*" capture="environment"
  style="position:fixed;top:-9999px;left:-9999px;opacity:0;width:1px;height:1px;">

<!-- METERS VIEW -->
<div id="main-view">
  <div class="tabs">
    <div class="tab active" id="tab-gaz" onclick="switchType('gaz')">🔥 Gaz</div>
    <div class="tab" id="tab-cieplo" onclick="switchType('cieplo')">♨️ Ciepło</div>
    <div class="tab" id="tab-woda" onclick="switchType('woda')">💧 Woda</div>
    <div class="tab" id="tab-send" onclick="showSummary()">💾 Zapisz</div>
  </div>
  <div class="house-bar" id="house-bar" style="display:none;">
    <button class="hbtn active" id="hbtn-21" onclick="switchHouse(21)">Blok 21</button>
    <button class="hbtn" id="hbtn-19" onclick="switchHouse(19)">Blok 19</button>
    <button class="hbtn" id="hbtn-17" onclick="switchHouse(17)">Blok 17</button>
    <button class="hbtn" id="hbtn-15" onclick="switchHouse(15)">Blok 15</button>
  </div>
  <div class="sec">
    <div class="stitle" id="sec-title">Gaz</div>
    <div class="chip">Gotowe: <b id="dcnt">0</b> / <b id="dtot">4</b></div>
    <div id="mlist"></div>
    <div class="cpanel" id="cpanel">
      <div class="chdr" id="chdr">—</div>
      <div class="cbody">
        <div class="photo-area" id="photoarea" onclick="openCamera()">
          <div class="ov"><span>📷</span><p>Naciśnij aby zrobić zdjęcie</p></div>
        </div>
        <div class="ocr-section" id="ocrbox" style="display:none;">
          <div id="ocr-fields"></div>
          <div class="ost" id="ost"></div>
        </div>
        <div class="row">
          <button class="btn btn-r" onclick="cancelPhoto()">Anuluj</button>
          <button class="btn btn-g" id="savebtn" disabled onclick="confirmPhoto()">Zapisz ✓</button>
        </div>
      </div>
    </div>
    <div style="margin-top:14px;">
      <button class="btn btn-g" onclick="showSummary()">💾 Zapisz archiwum →</button>
    </div>
  </div>
</div>

<!-- SUMMARY / SAVE -->
<div class="spanel" id="ssec">
  <div class="stitle">Zapisz archiwum</div>
  <div id="sum-stats" style="margin-bottom:14px;font-family:IBM Plex Mono,monospace;font-size:12px;line-height:2;color:var(--tx2);"></div>
  <button class="btn btn-g" id="save-arc-btn" onclick="saveArchive()">⬇️ Pobierz archiwum ZIP</button>
  <div class="smsg" id="smsg"></div>
  <div id="link-box" style="display:none;margin-top:12px;background:var(--sf);border:1px solid var(--ac);border-radius:10px;padding:14px;">
    <div style="font-family:IBM Plex Mono,monospace;font-size:11px;color:var(--ac);font-weight:600;margin-bottom:10px;">✅ Archiwum pobrane!</div>
    <div style="font-family:IBM Plex Mono,monospace;font-size:10px;color:var(--tx2);line-height:1.8;margin-bottom:10px;" id="arc-name-display"></div>
    <button class="btn btn-g" onclick="sendByEmail()">📧 Wyślij na e-mail</button>
    <div style="font-family:IBM Plex Mono,monospace;font-size:10px;color:var(--tx2);margin-top:8px;line-height:1.6;">Otworzy się aplikacja pocztowa — załącz pobrany plik ZIP.</div>
  </div>
  <button class="btn" style="margin-top:10px;" onclick="backToMeters()">← Wróć</button>
</div>

<!-- ARCHIVES VIEW -->
<div class="spanel" id="arcsec">
  <div class="stitle">Zapisane archiwa</div>
  <div id="arclist"></div>
</div>

<div class="botnav">
  <button class="bnbtn active" id="bn-gaz" onclick="switchType('gaz')"><span class="bnico">🔥</span>Gaz</button>
  <button class="bnbtn" id="bn-cieplo" onclick="switchType('cieplo')"><span class="bnico">♨️</span>Ciepło</button>
  <button class="bnbtn" id="bn-woda" onclick="switchType('woda')"><span class="bnico">💧</span>Woda</button>
  <button class="bnbtn" id="bn-arc" onclick="showArchives()"><span class="bnico">📦</span>Archiwa</button>
</div>

        {kw:10,serial:'5079120'},{kw:11,serial:'5078958'},{kw:12,serial:'5079122'}],

        {kw:5,sz:'230095934A',sc:'221368747A'},{kw:6,sz:'230095907A',sc:'221368748A'},

        {kw:3,sz:'230847001A',sc:'230073576A'},{kw:4,sz:'230847081A',sc:'230073550A'},

        {kw:7,sz:'230847020A',sc:'230073566A'},{kw:8,sz:'230846980A',sc:'230039689A'},

  }}
};

// ── STATE ─────────────────────────────────────────────────────────────
let curType='gaz', curHouse=21, selMeter=null, pendingUrl=null;
let photos={gaz:{},cieplo:{},woda:{}};
[21,19,17,15].forEach(h=>{photos.gaz[h]={};photos.cieplo[h]={};photos.woda[h]={};});

// ── INDEXEDDB ─────────────────────────────────────────────────────────
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('LiczenikiDB',1);
    req.onupgradeneeded=e=>{e.target.result.createObjectStore('archives',{keyPath:'id',autoIncrement:true});};
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=e=>rej(e);
  });
}
function dbSave(obj){
  return new Promise((res,rej)=>{
    const tx=db.transaction('archives','readwrite');
    const req=tx.objectStore('archives').add(obj);
    req.onsuccess=()=>res(req.result);
    req.onerror=e=>rej(e);
  });
}
function dbGetAll(){
  return new Promise((res,rej)=>{
    const tx=db.transaction('archives','readonly');
    const req=tx.objectStore('archives').getAll();
    req.onsuccess=()=>res(req.result);
    req.onerror=e=>rej(e);
  });
}
function dbDelete(id){
  return new Promise((res,rej)=>{
    const tx=db.transaction('archives','readwrite');
    const req=tx.objectStore('archives').delete(id);
    req.onsuccess=()=>res();
    req.onerror=e=>rej(e);
  });
}

// ── HELPERS ───────────────────────────────────────────────────────────
function getMonth(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function isDone(type,house,kw){
  const p=photos[type][house][kw];
  if(!p)return false;
  return type==='woda'?(p.zimna!=null&&p.ciepla!=null):(p.val!=null);
}
function totalFor(type){
  let done=0,total=0;
  [21,19,17,15].forEach(h=>{
    DATA[type].houses[h].forEach(m=>{total++;if(isDone(type,h,m.kw))done++;});
  });
  return{done,total};
}

// ── NAVIGATION ────────────────────────────────────────────────────────
function showView(v){
  document.getElementById('main-view').style.display=v==='main'?'block':'none';
  document.getElementById('ssec').className=v==='save'?'spanel vis':'spanel';
  document.getElementById('arcsec').className=v==='arc'?'spanel vis':'spanel';
}
function switchType(t){
  curType=t;
  document.getElementById('house-bar').style.display='none';
  if(t!=='gaz') document.getElementById('house-bar').style.display='flex';
  ['gaz','cieplo','woda','send'].forEach(x=>{
    const el=document.getElementById('tab-'+x);
    if(el)el.classList.toggle('active',x===t);
  });
  ['gaz','cieplo','woda','arc'].forEach(x=>{
    const el=document.getElementById('bn-'+x);
    if(el)el.classList.toggle('active',x===t);
  });
  cancelPhoto();
  showView('main');
  renderMeters();
  updateBadges();
}
function switchHouse(h){
  curHouse=h;
  [21,19,17,15].forEach(x=>document.getElementById('hbtn-'+x).classList.toggle('active',x===h));
  cancelPhoto();renderMeters();

function checkWaterReady(){
  document.getElementById('savebtn').disabled=
    !(document.getElementById('oval-zim').value&&document.getElementById('oval-cie').value);
}

async function runOCR(dataUrl){
  setOst('scan','⏳ Odczytuję wskazanie...');
  try{
    const base64=dataUrl.split(',')[1];
    const mtype=dataUrl.split(';')[0].split(':')[1];
    const isWoda=curType==='woda';
    const prompt=isWoda
      ?'Na zdjęciu są liczniki wody. Odczytaj wskazanie zimnej wody i ciepłej wody. Odpowiedz TYLKO: ZIMNA=liczba CIEPLA=liczba'
      :'Na zdjęciu jest licznik. Odczytaj wskazanie. Odpowiedz TYLKO liczbą (np: 19.412). Bez tekstu.';
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:100,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mtype,data:base64}},
          {type:'text',text:prompt}
        ]}]})
    });
    const data=await resp.json();
    const raw=(data.content&&data.content[0]&&data.content[0].text)||'';
    if(isWoda){
      const mz=raw.match(/ZIMNA=([0-9.]+)/i),mc=raw.match(/CIEPLA=([0-9.]+)/i);
      if(mz)document.getElementById('oval-zim').value=parseFloat(mz[1]);
      if(mc)document.getElementById('oval-cie').value=parseFloat(mc[1]);
      if(mz&&mc){setOst('ok','✅ ❄ '+mz[1]+' | 🌡 '+mc[1]+' — sprawdź!');checkWaterReady();}
      else throw new Error();
    } else {
      const num=parseFloat(raw.replace(/[^\d.]/g,''));
      if(!isNaN(num)&&num>=0){
        document.getElementById('oval-main').value=num;
        setOst('ok','✅ '+num+' '+DATA[curType].unit+' — sprawdź!');
        document.getElementById('savebtn').disabled=false;
      } else throw new Error();
    }
  }catch(e){setOst('err','⚠️ Nie udało się — wpisz ręcznie');document.getElementById('savebtn').disabled=false;}
}
function setOst(cls,txt){const el=document.getElementById('ost');el.className='ost vis '+cls;el.textContent=txt;}

function confirmPhoto(){
  if(!selMeter||!pendingUrl)return;
  const saveHouse = selMeter._house||curHouse;
  if(curType==='woda'){
    const z=parseFloat(document.getElementById('oval-zim').value);
    const c=parseFloat(document.getElementById('oval-cie').value);
    if(isNaN(z)||isNaN(c)){alert('Wpisz oba wskazania');return;}
    photos.woda[saveHouse][selMeter.kw]={dataUrl:pendingUrl,zimna:z,ciepla:c};
  } else {
    const v=parseFloat(document.getElementById('oval-main').value);
    if(isNaN(v)){alert('Wpisz wskazanie');return;}
    photos[curType][saveHouse][selMeter.kw]={dataUrl:pendingUrl,val:v};
  }
  document.getElementById('cpanel').className='cpanel';
  selMeter=null;pendingUrl=null;
  renderMeters();updateBadges();
}
function cancelPhoto(){
  document.getElementById('cpanel').className='cpanel';
  selMeter=null;pendingUrl=null;renderMeters();
}

// ── BUILD CSV ─────────────────────────────────────────────────────────
function buildCSV(){
  let csv='\uFEFF'+'Typ;Blok;Mieszkanie;Nr licznika;Wskazanie;Jednostka;Data\n';
  const date=new Date().toISOString().slice(0,10);
  [21,19,17,15].forEach(h=>{
    const gm=DATA.gaz.houses[h][0],gp=photos.gaz[h][gm.kw];
    if(gp&&gp.val!=null)csv+='Gaz;'+h+';'+gm.kw+';'+gm.serial+';'+gp.val+';m³;'+date+'\n';
    DATA.cieplo.houses[h].forEach(m=>{
      const p=photos.cieplo[h][m.kw];
      if(p&&p.val!=null)csv+='Ciepło;'+h+';'+m.kw+';'+m.serial+';'+p.val+';GJ;'+date+'\n';
    });
    DATA.woda.houses[h].forEach(m=>{
      const p=photos.woda[h][m.kw];
      if(p){
        if(p.zimna!=null)csv+='Woda zimna;'+h+';'+m.kw+';'+m.sz+';'+p.zimna+';m³;'+date+'\n';
        if(p.ciepla!=null)csv+='Woda ciepła;'+h+';'+m.kw+';'+m.sc+';'+p.ciepla+';m³;'+date+'\n';
      }
    });
  });
  return csv;
}

// ── SAVE ARCHIVE ──────────────────────────────────────────────────────
let lastArcName = '';
let lastArcBlob = null;

async function saveArchive(){
  const btn=document.getElementById('save-arc-btn');
  btn.disabled=true; btn.textContent='⏳ Pakuję...';
  showMsg('⏳ Tworzę archiwum ZIP...','info');
  document.getElementById('link-box').style.display='none';
  try{
    const zip=new JSZip();
    ['gaz','cieplo','woda'].forEach(type=>{
      [21,19,17,15].forEach(h=>{
        DATA[type].houses[h].forEach(m=>{
          const p=photos[type][h][m.kw];
          if(!p||!p.dataUrl)return;
          const fname=type+'_blok'+h+'_m'+m.kw+'_'+getMonth()+'.jpg';
          zip.file(fname,p.dataUrl.split(',')[1],{base64:true});
        });
      });
    });
    zip.file('raport_'+getMonth()+'.csv',buildCSV());
    const blob=await zip.generateAsync({type:'blob'});
    const arcName='liczniki_'+getMonth()+'.zip';
    lastArcName=arcName;
    lastArcBlob=blob;

    // Download ZIP
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=arcName;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);

    // Save to IndexedDB
    const reader=new FileReader();
    reader.onload=async function(e){
      try{
        await dbSave({name:arcName,date:new Date().toISOString(),
          sizeKb:Math.round(blob.size/1024),data:e.target.result,
          stats:{gaz:totalFor('gaz').done,cieplo:totalFor('cieplo').done,woda:totalFor('woda').done}
        });
      }catch(e2){}
    };
    reader.readAsDataURL(blob);

    document.getElementById('arc-name-display').textContent=
      arcName+'\nGaz: '+totalFor('gaz').done+' | Ciepło: '+totalFor('cieplo').done+' | Woda: '+totalFor('woda').done;
    document.getElementById('link-box').style.display='block';
    showMsg('✅ ZIP pobrany na urządzenie!','ok');
    btn.textContent='✅ Pobrano!';
    btn.disabled=false;
  }catch(e){
    showMsg('❌ Błąd: '+e.message,'err');
    btn.disabled=false; btn.textContent='⬇️ Pobierz archiwum ZIP';
  }
}

// ── RENDER ARCHIVES ───────────────────────────────────────────────────
async function renderArchives(){
  const list=document.getElementById('arclist');
  list.innerHTML='<div style="color:var(--tx2);font-family:IBM Plex Mono,monospace;font-size:11px;padding:10px 0;">⏳ Ładowanie...</div>';
  try{
    const archives=await dbGetAll();
    if(archives.length===0){
      list.innerHTML='<div class="empty-state">📦<br>Brak zapisanych archiwów<br><br>Zrób odczyty i zapisz archiwum</div>';
      return;
    }
    list.innerHTML='';
    archives.slice().reverse().forEach(arc=>{
      const d=new Date(arc.date);
      const dateStr=d.toLocaleDateString('pl-PL',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
      const div=document.createElement('div');
      div.className='arc-card';
      div.innerHTML=
        '<div class="arc-icon">📦</div>'+
        '<div class="arc-info">'+
          '<div class="arc-name">'+arc.name+'</div>'+
          '<div class="arc-date">'+dateStr+'</div>'+
          '<div class="arc-size">'+arc.sizeKb+' KB'+
          (arc.stats?' · Gaz:'+arc.stats.gaz+' Ciepło:'+arc.stats.cieplo+' Woda:'+arc.stats.woda:'')+'</div>'+
        '</div>'+
        '<div class="arc-actions">'+
          '<button class="arc-btn dl" onclick="downloadArc('+arc.id+')">⬇ Pobierz</button>'+
          '<button class="arc-btn del" onclick="deleteArc('+arc.id+')">🗑 Usuń</button>'+
        '</div>';
      list.appendChild(div);
    });
  }catch(e){list.innerHTML='<div class="empty-state">❌ Błąd: '+e.message+'</div>';}
}

async function downloadArc(id){
  const tx=db.transaction('archives','readonly');
  const req=tx.objectStore('archives').get(id);
  req.onsuccess=function(){
    const arc=req.result;
    const a=document.createElement('a');
    a.href=arc.data;
    a.download=arc.name;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  };
}

async function deleteArc(id){
  if(!confirm('Usunąć to archiwum?'))return;
  await dbDelete(id);
  await renderArchives();
}
