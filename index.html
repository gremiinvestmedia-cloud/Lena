<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Liczniki</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
:root{--bg:#0d0f0e;--sf:#161a17;--sf2:#1e2420;--ac:#4ade80;--ac2:#22c55e;--tx:#e2e8f0;--tx2:#94a3b8;--bd:#2d3748;--red:#f87171;--yw:#fbbf24;--bl:#60a5fa;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;max-width:500px;margin:0 auto;padding-bottom:80px;}
header{padding:14px 20px 10px;border-bottom:1px solid var(--bd);background:var(--sf);position:sticky;top:0;z-index:100;}
header h1{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--ac);letter-spacing:.15em;text-transform:uppercase;}
header p{font-size:10px;color:var(--tx2);margin-top:2px;font-family:'IBM Plex Mono',monospace;}
.tabs{display:flex;background:var(--sf);border-bottom:1px solid var(--bd);}
.tab{flex:1;padding:10px 4px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.tab.active{color:var(--ac);border-bottom-color:var(--ac);}
.house-bar{display:flex;gap:6px;padding:10px 14px;background:var(--sf2);border-bottom:1px solid var(--bd);overflow-x:auto;}
.hbtn{flex-shrink:0;padding:5px 13px;border-radius:20px;border:1px solid var(--bd);background:var(--sf);color:var(--tx2);font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.hbtn.active{background:var(--ac);color:#0d1f14;border-color:var(--ac);font-weight:600;}
.sec{padding:14px 16px;}
.stitle{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--tx2);text-transform:uppercase;margin-bottom:10px;}
.chip{display:inline-flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:2px 8px;border-radius:20px;background:var(--sf2);color:var(--tx2);border:1px solid var(--bd);margin-bottom:12px;}
.chip b{color:var(--ac);}
.mcard{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:7px;cursor:pointer;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;transition:border-color .15s,background .15s;}
.mcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#4a5568;}
.mcard.sel{border-color:var(--ac);background:#0f2318;}.mcard.sel::before{background:var(--ac);}
.mcard.done{border-color:#1e4d2b;}.mcard.done::before{background:var(--ac2);}
.mi{width:34px;height:34px;background:var(--sf2);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;}
.mcard.done .mi{background:#0f2318;}
.minfo{flex:1;min-width:0;}
.mkw{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;}
.mser{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx2);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mbadge{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:2px 7px;border-radius:6px;background:var(--sf2);color:var(--tx2);flex-shrink:0;text-align:right;}
.mcard.done .mbadge{background:#0f2318;color:var(--ac);}
.mbadges{display:flex;flex-direction:column;gap:3px;flex-shrink:0;}
.wbadge{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:2px 6px;border-radius:5px;background:var(--sf2);color:var(--tx2);white-space:nowrap;}
.wbadge.ok{background:#0f2318;color:var(--ac);}
.cpanel{display:none;background:var(--sf);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-top:10px;}
.cpanel.vis{display:block;}
.chdr{padding:9px 13px;border-bottom:1px solid var(--bd);font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ac);}
.cbody{padding:12px;display:flex;flex-direction:column;gap:9px;}
.photo-area{width:100%;height:150px;background:var(--sf2);border:2px dashed var(--bd);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s;}
.photo-area:active{border-color:var(--ac);}
.photo-area.hp{border-style:solid;border-color:var(--ac2);}
.photo-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.photo-area .ov{position:relative;z-index:2;text-align:center;}
.photo-area .ov span{display:block;font-size:28px;line-height:1;}
.photo-area .ov p{font-size:11px;color:var(--tx2);margin-top:6px;}
.photo-area.hp .ov p{color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9);font-weight:500;}
.val-box{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:10px;}
.val-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;margin-top:12px;}
.val-lbl:first-child{margin-top:0;}
.val-lbl.zim{color:var(--ac);}
.val-lbl.cie{color:var(--bl);}
.val-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.oval{flex:1;padding:9px 10px;border-radius:7px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;text-align:center;width:100%;-webkit-appearance:none;}
.oval:focus{outline:none;border-color:var(--ac);}
.ounit{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--tx2);white-space:nowrap;}
.row{display:flex;gap:7px;}
.btn{flex:1;padding:11px;border-radius:8px;border:1px solid var(--bd);background:var(--sf2);color:var(--tx);font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;text-align:center;transition:all .15s;-webkit-appearance:none;display:block;width:100%;}
.btn:active{transform:scale(.97);}
.btn-g{background:var(--ac);color:#0d1f14;border-color:var(--ac);font-weight:600;}
.btn-g:active{background:var(--ac2);}
.btn-g:disabled{opacity:.35;pointer-events:none;}
.btn-r{border-color:#4a1c1c;color:var(--red);}
/* Share card */
.share-card{background:#0a1f12;border:1px solid #1e4d2b;border-radius:10px;padding:13px;margin-top:10px;}
.share-card-title{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ac2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;}
.share-card-file{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--tx2);margin-bottom:10px;word-break:break-all;}
.share-btns{display:flex;gap:7px;}
.sbtn{flex:1;padding:11px 6px;border-radius:8px;border:none;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;}
.sbtn:active{transform:scale(.97);}
.sbtn-share{background:var(--ac);color:#0d1f14;}
.sbtn-dl{background:var(--sf2);color:var(--tx);border:1px solid var(--bd);}
/* Summary */
.spanel{display:none;padding:14px 16px;}
.spanel.vis{display:block;}
.sum-share-all{width:100%;padding:15px;border-radius:10px;border:none;background:var(--ac);color:#0d1f14;font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:14px;transition:all .15s;}
.sum-share-all:active{background:var(--ac2);transform:scale(.98);}
.photo-row{display:flex;align-items:center;gap:8px;background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:9px 11px;margin-bottom:7px;}
.photo-thumb{width:44px;height:44px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--sf2);}
.photo-thumb-ph{width:44px;height:44px;border-radius:6px;flex-shrink:0;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:20px;}
.photo-fname{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;word-break:break-all;line-height:1.4;}
.photo-share-btn{flex-shrink:0;padding:8px 12px;border-radius:7px;border:none;background:var(--ac);color:#0d1f14;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;cursor:pointer;}
.photo-share-btn:active{background:var(--ac2);}
.empty-state{text-align:center;padding:40px 20px;color:var(--tx2);font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:2;}
/* Readings table */
.rtable{width:100%;border-collapse:collapse;margin-bottom:14px;}
.rtable th{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);padding:5px 8px;text-align:left;border-bottom:1px solid var(--bd);}
.rtable td{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--tx);padding:6px 8px;border-bottom:1px solid #1e2a20;}
.rtable tr:last-child td{border-bottom:none;}
.rtable td.val{color:var(--ac);font-weight:600;}
.rtable td.miss{color:var(--tx2);}
.rtable-sec{background:var(--sf);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:12px;}
.rtable-hdr{padding:8px 12px;background:var(--sf2);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--ac);border-bottom:1px solid var(--bd);}
/* Bottom nav */
.botnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:var(--sf);border-top:1px solid var(--bd);display:flex;z-index:200;}
.bnbtn{flex:1;padding:12px 4px 10px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx2);cursor:pointer;transition:color .15s;border:none;background:none;}
.bnbtn .bnico{font-size:18px;display:block;margin-bottom:2px;}
.bnbtn.active{color:var(--ac);}
.bnbtn .cnt{display:inline-block;background:var(--ac2);color:#0d1f14;font-size:8px;font-weight:600;padding:1px 4px;border-radius:10px;margin-left:2px;}
</style>
</head>
<body>

<header>
  <h1>⚡ Liczniki — Blok 21/19/17/15</h1>
  <p id="hdate"></p>
</header>

<input type="file" id="fileinput" accept="image/*" capture="environment"
  style="position:fixed;top:-9999px;left:-9999px;opacity:0;width:1px;height:1px;">

<!-- METERS VIEW -->
<div id="main-view">
  <div class="tabs">
    <div class="tab active" id="tab-gaz" onclick="switchType('gaz')">🔥 Gaz</div>
    <div class="tab" id="tab-cieplo" onclick="switchType('cieplo')">♨️ Ciepło</div>
    <div class="tab" id="tab-woda" onclick="switchType('woda')">💧 Woda</div>
  </div>
  <div class="house-bar" id="house-bar" style="display:none;">
    <button class="hbtn active" id="hbtn-21" onclick="switchHouse(21)">Blok 21</button>
    <button class="hbtn" id="hbtn-19" onclick="switchHouse(19)">Blok 19</button>
    <button class="hbtn" id="hbtn-17" onclick="switchHouse(17)">Blok 17</button>
    <button class="hbtn" id="hbtn-15" onclick="switchHouse(15)">Blok 15</button>
  </div>
  <div class="sec">
    <div class="stitle" id="sec-title">Gaz</div>
    <div class="chip">Gotowe: <b id="dcnt">0</b> / <b id="dtot">4</b></div>
    <div id="mlist"></div>

    <!-- Input panel -->
    <div class="cpanel" id="cpanel">
      <div class="chdr" id="chdr">—</div>
      <div class="cbody">
        <div class="photo-area" id="photoarea" onclick="openCamera()">
          <div class="ov"><span>📷</span><p>Naciśnij, aby zrobić zdjęcie</p></div>
        </div>
        <div class="val-box" id="valbox"></div>
        <div class="row">
          <button class="btn btn-r" onclick="cancelPhoto()">Anuluj</button>
          <button class="btn btn-g" id="savebtn" disabled onclick="confirmPhoto()">Zapisz ✓</button>
        </div>
      </div>
    </div>

    <!-- Share card (shown after save) -->
    <div id="share-card" style="display:none;" class="share-card">
      <div class="share-card-title">✅ Zapisano</div>
      <div class="share-card-file" id="share-card-file"></div>
      <div class="share-btns">
        <button class="sbtn sbtn-share" onclick="shareLastSaved()">📤 Udostępnij</button>
        <button class="sbtn sbtn-dl" onclick="downloadLastSaved()">⬇ Pobierz</button>
      </div>
    </div>

    <div style="margin-top:14px;">
      <button class="btn btn-g" onclick="showSummary()">📤 Wyślij wszystkie →</button>
    </div>
  </div>
</div>

<!-- SUMMARY / SEND -->
<div class="spanel" id="ssec">
  <div class="stitle">Wyślij zdjęcia</div>
  <div id="sum-stats" style="margin-bottom:14px;font-family:IBM Plex Mono,monospace;font-size:12px;line-height:2;color:var(--tx2);"></div>
  <div id="readings-table"></div>
  <button class="sum-share-all" onclick="shareAll()">📤 Udostępnij wszystkie zdjęcia</button>
  <div id="file-buttons"></div>
  <button class="btn" style="margin-top:12px;" onclick="backToMeters()">← Wróć</button>
</div>

<div class="botnav">
  <button class="bnbtn active" id="bn-gaz" onclick="switchType('gaz')"><span class="bnico">🔥</span>Gaz</button>
  <button class="bnbtn" id="bn-cieplo" onclick="switchType('cieplo')"><span class="bnico">♨️</span>Ciepło</button>
  <button class="bnbtn" id="bn-woda" onclick="switchType('woda')"><span class="bnico">💧</span>Woda</button>
  <button class="bnbtn" id="bn-send" onclick="showSummary()"><span class="bnico">📤</span>Wyślij</button>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const DATA = {
  gaz: { label:'Gaz', unit:'m³', houses: {
    21:[{kw:1,serial:'282405307798'}],
    19:[{kw:1,serial:'282405307802'}],

    21:[{kw:1,serial:'5042721'},{kw:2,serial:'5043366'},{kw:3,serial:'5042733'},
        {kw:4,serial:'5043361'},{kw:5,serial:'5042727'},{kw:6,serial:'5042698'},
        {kw:7,serial:'5042700'},{kw:8,serial:'5042724'},{kw:9,serial:'5043037'},
        {kw:10,serial:'5042726'},{kw:11,serial:'5042728'},{kw:12,serial:'5043379'}],
    19:[{kw:1,serial:'5042994'},{kw:2,serial:'5069824'},{kw:3,serial:'5066429'},
        {kw:4,serial:'5066433'},{kw:5,serial:'5066431'},{kw:6,serial:'5068432'},
        {kw:7,serial:'5069880'},{kw:8,serial:'5186665'},{kw:9,serial:'5069863'},
        {kw:10,serial:'5069825'},{kw:11,serial:'5059456'},{kw:12,serial:'5038000'}],
    17:[{kw:1,serial:'5078944'},{kw:2,serial:'5079647'},{kw:3,serial:'5079393'},
        {kw:4,serial:'5079640'},{kw:5,serial:'5079651'},{kw:6,serial:'5078948'},
        {kw:7,serial:'5079638'},{kw:8,serial:'5078951'},{kw:9,serial:'5078942'},
        {kw:10,serial:'5079120'},{kw:11,serial:'5078958'},{kw:12,serial:'5079122'}],
    15:[{kw:1,serial:'5078971'},{kw:2,serial:'5072842'},{kw:3,serial:'5077334'},
        {kw:4,serial:'5079634'},{kw:5,serial:'5078963'},{kw:6,serial:'5078959'},
        {kw:7,serial:'5068418'},{kw:8,serial:'5077065'},{kw:9,serial:'5069829'},
        {kw:10,serial:'5077519'},{kw:11,serial:'5068500'},{kw:12,serial:'5069881'}]
  }},
  woda: { label:'Woda', unit:'m³', houses: {
    21:[{kw:1,sz:'230565273A',sc:'221368706A'},{kw:2,sz:'230565268A',sc:'221368766A'},
        {kw:3,sz:'230095926A',sc:'221368685A'},{kw:4,sz:'230095938A',sc:'221368785A'},
        {kw:5,sz:'230095934A',sc:'221368747A'},{kw:6,sz:'230095907A',sc:'221368748A'},
        {kw:7,sz:'230565269A',sc:'221368715A'},{kw:8,sz:'230095927A',sc:'221368786A'},
        {kw:9,sz:'230565250A',sc:'221368769A'},{kw:10,sz:'230565246A',sc:'221368771A'},
        {kw:11,sz:'230095670A',sc:'221368736A'},{kw:12,sz:'230565266A',sc:'221368714A'}],
    19:[{kw:1,sz:'230847103A',sc:'230073575A'},{kw:2,sz:'230847015A',sc:'230073561A'},
        {kw:3,sz:'230847001A',sc:'230073576A'},{kw:4,sz:'230847081A',sc:'230073550A'},
        {kw:5,sz:'230847050A',sc:'230073549A'},{kw:6,sz:'230847000A',sc:'230073551A'},

        {kw:9,sz:'230847092A',sc:'230073573A'},{kw:10,sz:'230847060A',sc:'230013560A'},
        {kw:11,sz:'230847039A',sc:'230073558A'},{kw:12,sz:'320847113A',sc:'230073577A'}],
    17:[{kw:1,sz:'230846995A',sc:'230073557A'},{kw:2,sz:'230846979A',sc:'221368717A'},
        {kw:3,sz:'230847029A',sc:'221368738A'},{kw:4,sz:'230847017A',sc:'221368778A'},
        {kw:5,sz:'230847016A',sc:'221368692A'},{kw:6,sz:'230846981A',sc:'230346378A'},
        {kw:7,sz:'230847020A',sc:'230073566A'},{kw:8,sz:'230846980A',sc:'230039689A'},
        {kw:9,sz:'230846999A',sc:'230073542A'},{kw:10,sz:'230847049A',sc:'230073556A'},
        {kw:11,sz:'230847040A',sc:'230073554A'},{kw:12,sz:'230847003A',sc:'230073544A'}],
    15:[{kw:1,sz:'230847030A',sc:'230073516A'},{kw:2,sz:'230847105A',sc:'230039695A'},
        {kw:3,sz:'230847002A',sc:'230073562A'},{kw:4,sz:'230847095A',sc:'230073503A'},
        {kw:5,sz:'230847071A',sc:'230073548A'},{kw:6,sz:'230847093A',sc:'230073501A'},
        {kw:7,sz:'230847008A',sc:'221368770A'},{kw:8,sz:'230847091A',sc:'230073563A'},
        {kw:9,sz:'230847019A',sc:'230073559A'},{kw:10,sz:'230846982A',sc:'230039698A'},
        {kw:11,sz:'230847014A',sc:'230073526A'},{kw:12,sz:'230847031A',sc:'221368732A'}]
  }}
};

// ── STATE ─────────────────────────────────────────────────────────────
let curType='gaz', curHouse=21, selMeter=null, pendingUrl=null;
let lastSaved={type:null,house:null,kw:null};
let photos={gaz:{},cieplo:{},woda:{}};
[21,19,17,15].forEach(h=>{photos.gaz[h]={};photos.cieplo[h]={};photos.woda[h]={};});

// ── HELPERS ───────────────────────────────────────────────────────────
function getMonth(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function getFilename(type,house,kw){
  return type+'_blok'+house+'_m'+kw+'_'+getMonth()+'.jpg';
}
function isDone(type,house,kw){
  const p=photos[type][house][kw];
  if(!p)return false;
  if(p.dataUrl)return true;
  if(type==='woda')return p.zimna!=null&&p.ciepla!=null;
  return p.val!=null;
}
function totalFor(type){
  let done=0,total=0;
  [21,19,17,15].forEach(h=>{
    DATA[type].houses[h].forEach(m=>{total++;if(isDone(type,h,m.kw))done++;});
  });
  return{done,total};
}
function dataURLtoBlob(dataUrl){
  const arr=dataUrl.split(',');
  const mime=arr[0].match(/:(.*?);/)[1];
  const bstr=atob(arr[1]);
  let n=bstr.length;
  const u8=new Uint8Array(n);
  while(n--)u8[n]=bstr.charCodeAt(n);
  return new Blob([u8],{type:mime});
}
function downloadURL(dataUrl,filename){
  const blob=dataURLtoBlob(dataUrl);
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),2000);
}

// ── SHARE ─────────────────────────────────────────────────────────────
async function shareFile(dataUrl,filename){
  const blob=dataURLtoBlob(dataUrl);
  const file=new File([blob],filename,{type:blob.type});
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file],title:filename,text:'📎 '+filename});return;}
    catch(e){if(e.name==='AbortError')return;}
  }
  downloadURL(dataUrl,filename);
}

async function shareAll(){
  const files=[],dataUrls=[],names=[];
  ['gaz','cieplo','woda'].forEach(type=>{
    [21,19,17,15].forEach(h=>{
      DATA[type].houses[h].forEach(m=>{
        const p=photos[type][h][m.kw];
        if(!p||!p.dataUrl)return;
        const fname=getFilename(type,h,m.kw);
        const blob=dataURLtoBlob(p.dataUrl);
        files.push(new File([blob],fname,{type:blob.type}));
        dataUrls.push(p.dataUrl);
        names.push(fname);
      });
    });
  });
  if(files.length===0){alert('Brak zdjęć do wysłania.\nNajpierw zrób odczyty.');return;}
  const shareText=names.map(n=>'📎 '+n).join('\n');
  if(navigator.share&&navigator.canShare&&navigator.canShare({files})){
    try{await navigator.share({files,title:'Liczniki '+getMonth(),text:shareText});return;}
    catch(e){if(e.name==='AbortError')return;}
  }
  dataUrls.forEach((u,i)=>setTimeout(()=>downloadURL(u,names[i]),i*300));
}

function shareLastSaved(){
  if(!lastSaved.type)return;
  const p=photos[lastSaved.type][lastSaved.house][lastSaved.kw];
  if(p&&p.dataUrl)shareFile(p.dataUrl,getFilename(lastSaved.type,lastSaved.house,lastSaved.kw));
}
function downloadLastSaved(){
  if(!lastSaved.type)return;
  const p=photos[lastSaved.type][lastSaved.house][lastSaved.kw];
  if(p&&p.dataUrl)downloadURL(p.dataUrl,getFilename(lastSaved.type,lastSaved.house,lastSaved.kw));
}

// ── NAVIGATION ────────────────────────────────────────────────────────
function showView(v){
  document.getElementById('main-view').style.display=v==='main'?'block':'none';
  document.getElementById('ssec').className=v==='save'?'spanel vis':'spanel';
}
function switchType(t){
  curType=t;
  document.getElementById('house-bar').style.display=t==='gaz'?'none':'flex';
  ['gaz','cieplo','woda'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
    document.getElementById('bn-'+x).classList.toggle('active',x===t);
  });
  document.getElementById('bn-send').classList.remove('active');
  cancelPhoto();
  showView('main');
  renderMeters();
  updateBadges();
}
function switchHouse(h){
  curHouse=h;
  [21,19,17,15].forEach(x=>document.getElementById('hbtn-'+x).classList.toggle('active',x===h));
  cancelPhoto();
  renderMeters();
}
function showSummary(){
  showView('save');
  ['gaz','cieplo','woda'].forEach(x=>{
    document.getElementById('bn-'+x).classList.remove('active');
  });
  document.getElementById('bn-send').classList.add('active');

  const stats=document.getElementById('sum-stats');
  stats.innerHTML='';
  ['gaz','cieplo','woda'].forEach(t=>{
    const{done,total}=totalFor(t);
    stats.innerHTML+='<div>'+DATA[t].label+': <b style="color:var(--ac)">'+done+'</b>/'+total+' zdjęć</div>';
  });

  buildReadingsTable();
  const fb=document.getElementById('file-buttons');
  fb.innerHTML='';
  let count=0;
  ['gaz','cieplo','woda'].forEach(type=>{
    [21,19,17,15].forEach(h=>{
      DATA[type].houses[h].forEach(m=>{
        const p=photos[type][h][m.kw];
        if(!p||!p.dataUrl)return;
        count++;
        const fname=getFilename(type,h,m.kw);
        const row=document.createElement('div');
        row.className='photo-row';
        const img=document.createElement('img');
        img.className='photo-thumb';
        img.src=p.dataUrl;
        const fnDiv=document.createElement('div');
        fnDiv.className='photo-fname';
        fnDiv.textContent=fname;
        const btn=document.createElement('button');
        btn.className='photo-share-btn';
        btn.textContent='📤';
        btn.onclick=(()=>{
          const _type=type,_h=h,_kw=m.kw,_fname=fname;
          return ()=>shareFile(photos[_type][_h][_kw].dataUrl,_fname);
        })();
        row.appendChild(img);row.appendChild(fnDiv);row.appendChild(btn);
        fb.appendChild(row);
      });
    });
  });
  if(count===0){
    fb.innerHTML='<div class="empty-state">📷<br>Brak zdjęć<br>Najpierw zrób odczyty</div>';
  } else {
    const csvBtn=document.createElement('button');
    csvBtn.className='btn';
    csvBtn.style.cssText='margin-top:10px;border-color:var(--yw);color:var(--yw);';
    csvBtn.textContent='⬇ Pobierz raport CSV';
    csvBtn.onclick=downloadCSV;
    fb.appendChild(csvBtn);
  }
}
function backToMeters(){showView('main');switchType(curType);}

// ── READINGS TABLE ────────────────────────────────────────────────────

  const el=document.getElementById('readings-table');
  el.innerHTML='';

  // GAZ
  let gazRows='';
  [21,19,17,15].forEach(h=>{
    const m=DATA.gaz.houses[h][0];
    const p=photos.gaz[h][m.kw]||{};
    const val=p.val!=null?p.val+' m³':null;
    const photo=p.dataUrl?'📷':'';
    gazRows+=
      '<tr>'+
        '<td>Blok '+h+'</td>'+
        '<td>'+m.serial+'</td>'+
        '<td class="'+(val?'val':'miss')+'">'+( val||'—')+'</td>'+
        '<td>'+photo+'</td>'+
      '</tr>';
  });
  el.innerHTML+=
    '<div class="rtable-sec">'+
      '<div class="rtable-hdr">🔥 Gaz</div>'+
      '<table class="rtable">'+
        '<tr><th>Blok</th><th>Nr licznika</th><th>Wskazanie</th><th></th></tr>'+
        gazRows+
      '</table>'+
    '</div>';

  // CIEPŁO — per house
  [21,19,17,15].forEach(h=>{
    let rows='';
    DATA.cieplo.houses[h].forEach(m=>{
      const p=photos.cieplo[h][m.kw]||{};
      const val=p.val!=null?p.val+' GJ':null;
      const photo=p.dataUrl?'📷':'';
      rows+=
        '<tr>'+
          '<td>m.'+m.kw+'</td>'+
          '<td>'+m.serial+'</td>'+
          '<td class="'+(val?'val':'miss')+'">'+( val||'—')+'</td>'+
          '<td>'+photo+'</td>'+
        '</tr>';
    });
    el.innerHTML+=
      '<div class="rtable-sec">'+
        '<div class="rtable-hdr">♨️ Ciepło — Blok '+h+'</div>'+
        '<table class="rtable">'+
          '<tr><th>Mieszk.</th><th>Nr licznika</th><th>Wskazanie</th><th></th></tr>'+
          rows+
        '</table>'+
      '</div>';
  });

  // WODA — per house
  [21,19,17,15].forEach(h=>{
    let rows='';
    DATA.woda.houses[h].forEach(m=>{
      const p=photos.woda[h][m.kw]||{};
      const zim=p.zimna!=null?p.zimna+' m³':null;
      const cie=p.ciepla!=null?p.ciepla+' m³':null;
      const photo=p.dataUrl?'📷':'';
      rows+=

          '<td class="'+(cie?'val':'miss')+'">🌡 '+(cie||'—')+'</td>'+

        '<div class="rtable-hdr">💧 Woda — Blok '+h+'</div>'+
        '<table class="rtable">'+
          '<tr><th>Mieszk.</th><th>Zimna</th><th>Ciepła</th><th></th></tr>'+
          rows+
        '</table>'+
      '</div>';
  });
}

// ── CSV ───────────────────────────────────────────────────────────────
function buildCSV(){
  let csv='﻿Typ;Blok;Mieszkanie;Nr licznika;Wskazanie;Jednostka;Data\n';
  const date=new Date().toISOString().slice(0,10);
  [21,19,17,15].forEach(h=>{
    const gm=DATA.gaz.houses[h][0],gp=photos.gaz[h][gm.kw];
    if(gp&&gp.val!=null)csv+='Gaz;'+h+';'+gm.kw+';'+gm.serial+';'+gp.val+';m³;'+date+'\n';
    DATA.cieplo.houses[h].forEach(m=>{
      const p=photos.cieplo[h][m.kw];
      if(p&&p.val!=null)csv+='Ciepło;'+h+';'+m.kw+';'+m.serial+';'+p.val+';GJ;'+date+'\n';
    });
    DATA.woda.houses[h].forEach(m=>{
      const p=photos.woda[h][m.kw];
      if(p){
        if(p.zimna!=null)csv+='Woda zimna;'+h+';'+m.kw+';'+m.sz+';'+p.zimna+';m³;'+date+'\n';
        if(p.ciepla!=null)csv+='Woda ciepła;'+h+';'+m.kw+';'+m.sc+';'+p.ciepla+';m³;'+date+'\n';
      }
    });
  });
  return csv;
}
function downloadCSV(){
  const blob=new Blob([buildCSV()],{type:'text/csv;charset=utf-8'});
  downloadURL(URL.createObjectURL(blob),'raport_'+getMonth()+'.csv');
}

// ── RENDER METERS ─────────────────────────────────────────────────────
function renderMeters(){
  const list=document.getElementById('mlist');
  list.innerHTML='';
  const{done,total}=totalFor(curType);
  document.getElementById('dcnt').textContent=done;
  document.getElementById('dtot').textContent=total;
  let title=DATA[curType].label;
  if(curType!=='gaz')title+=' — Blok '+curHouse;
  document.getElementById('sec-title').textContent=title;

  const housesToShow=curType==='gaz'?[21,19,17,15]:[curHouse];
  housesToShow.forEach(houseNum=>{
    DATA[curType].houses[houseNum].forEach(m=>{
      const done2=isDone(curType,houseNum,m.kw);
      const sel=selMeter&&selMeter.kw===m.kw&&selMeter._house===houseNum;
      const p=photos[curType][houseNum][m.kw]||{};
      const div=document.createElement('div');
      div.className='mcard'+(sel?' sel':'')+(done2?' done':'');

      if(curType==='woda'){
        div.innerHTML=
          '<div class="mi">'+(done2?'✅':'💧')+'</div>'+
          '<div class="minfo">'+
            '<div class="mkw">Mieszkanie '+m.kw+'</div>'+
            '<div class="mser">❄ '+m.sz+' · 🌡 '+m.sc+'</div>'+
          '</div>'+
          '<div class="mbadges">'+
            '<div class="wbadge'+(p.zimna!=null?' ok':'')+'">❄ '+(p.zimna!=null?p.zimna+' m³':'—')+'</div>'+
            '<div class="wbadge'+(p.ciepla!=null?' ok':'')+'">🌡 '+(p.ciepla!=null?p.ciepla+' m³':'—')+'</div>'+
          '</div>';
      } else {
        const lbl=curType==='gaz'?'Blok '+houseNum:'Mieszkanie '+m.kw;
        const icon=done2?'✅':(curType==='gaz'?'🔥':'♨️');
        const badge=done2?(p.val!=null?p.val+' '+DATA[curType].unit:'📷'):'—';
        div.innerHTML=
          '<div class="mi">'+icon+'</div>'+
          '<div class="minfo">'+
            '<div class="mkw">'+lbl+'</div>'+
            '<div class="mser">'+m.serial+'</div>'+
          '</div>'+
          '<div class="mbadge">'+badge+'</div>';
      }
      div.onclick=()=>selectMeter(Object.assign({},m,{_house:houseNum}),houseNum);
      list.appendChild(div);
    });
  });
}
function updateBadges(){
  ['gaz','cieplo','woda'].forEach(t=>{
    const{done}=totalFor(t);
    const btn=document.getElementById('bn-'+t);
    const ex=btn.querySelector('.cnt');if(ex)ex.remove();
    if(done>0){const sp=document.createElement('span');sp.className='cnt';sp.textContent=done;btn.appendChild(sp);}
  });
}

// ── SELECT METER ──────────────────────────────────────────────────────
function selectMeter(m,houseOverride){
  if(houseOverride!==undefined)curHouse=houseOverride;
  selMeter=m;
  pendingUrl=null;
  document.getElementById('share-card').style.display='none';

  const lbl=curType==='gaz'?'Blok '+(m._house||curHouse):'Mieszkanie '+m.kw;
  const serial=m.serial?' ('+m.serial+')':m.sz?' ('+m.sz+' / '+m.sc+')':'';
  document.getElementById('chdr').textContent='📍 '+lbl+serial;
  document.getElementById('cpanel').className='cpanel vis';
  document.getElementById('savebtn').disabled=true;

  resetPhotoArea();
  buildValFields(m);
  renderMeters();
  setTimeout(()=>document.getElementById('cpanel').scrollIntoView({behavior:'smooth',block:'nearest'}),80);
}

function buildValFields(m){
  const vb=document.getElementById('valbox');
  const h=m._house||curHouse;
  const existing=photos[curType][h][m.kw]||{};
  if(curType==='woda'){
    vb.innerHTML=
      '<div class="val-lbl zim">❄ Zimna woda ('+m.sz+')</div>'+
      '<div class="val-row"><input type="number" class="oval" id="oval-zim" placeholder="0.000" inputmode="decimal" step="0.001"><span class="ounit">m³</span></div>'+
      '<div class="val-lbl cie">🌡 Ciepła woda ('+m.sc+')</div>'+
      '<div class="val-row"><input type="number" class="oval" id="oval-cie" placeholder="0.000" inputmode="decimal" step="0.001"><span class="ounit">m³</span></div>';
    const zim=document.getElementById('oval-zim');
    const cie=document.getElementById('oval-cie');
    if(existing.zimna!=null)zim.value=existing.zimna;
    if(existing.ciepla!=null)cie.value=existing.ciepla;
    if(existing.dataUrl){
      const pa=document.getElementById('photoarea');
      pa.className='photo-area hp';
      pa.innerHTML='<img src="'+existing.dataUrl+'"><div class="ov"><p>📸 Zmień zdjęcie</p></div>';
      pendingUrl=existing.dataUrl;
    }
    zim.addEventListener('input',updateSaveBtn);
    cie.addEventListener('input',updateSaveBtn);
  } else {
    vb.innerHTML=
      '<div class="val-lbl">Wskazanie ('+DATA[curType].unit+')</div>'+
      '<div class="val-row"><input type="number" class="oval" id="oval-main" placeholder="0.000" inputmode="decimal" step="0.001"><span class="ounit">'+DATA[curType].unit+'</span></div>';
    const main=document.getElementById('oval-main');
    if(existing.val!=null)main.value=existing.val;
    if(existing.dataUrl){
      const pa=document.getElementById('photoarea');
      pa.className='photo-area hp';
      pa.innerHTML='<img src="'+existing.dataUrl+'"><div class="ov"><p>📸 Zmień zdjęcie</p></div>';
      pendingUrl=existing.dataUrl;
    }
    main.addEventListener('input',updateSaveBtn);
  }
  updateSaveBtn();
}

function updateSaveBtn(){
  // Enable save if photo taken OR at least one value entered
  const hasPhoto=!!pendingUrl;
  let hasValue=false;
  if(curType==='woda'){
    const z=document.getElementById('oval-zim');
    const c=document.getElementById('oval-cie');
    hasValue=!!(z&&z.value||c&&c.value);
  } else {
    const v=document.getElementById('oval-main');
    hasValue=!!(v&&v.value);
  }
  document.getElementById('savebtn').disabled=!hasPhoto&&!hasValue;
}

function resetPhotoArea(){
  const pa=document.getElementById('photoarea');
  pa.className='photo-area';
  pa.innerHTML='<div class="ov"><span>📷</span><p>Naciśnij, aby zrobić zdjęcie</p></div>';
}

// ── CAMERA ────────────────────────────────────────────────────────────
const fileInput=document.getElementById('fileinput');
function openCamera(){fileInput.value='';fileInput.click();}
fileInput.addEventListener('change',function(){
  const file=this.files&&this.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const MAX=1600;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){
        if(w>h){h=Math.round(h*MAX/w);w=MAX;}
        else{w=Math.round(w*MAX/h);h=MAX;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      pendingUrl=canvas.toDataURL('image/jpeg',0.82);
      const pa=document.getElementById('photoarea');
      pa.className='photo-area hp';
      pa.innerHTML='<img src="'+pendingUrl+'"><div class="ov"><p>📸 Gotowe — zmień zdjęcie</p></div>';
      updateSaveBtn();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
});

// ── SAVE ──────────────────────────────────────────────────────────────
function confirmPhoto(){
  if(!selMeter)return;
  const saveHouse=selMeter._house||curHouse;

  if(curType==='woda'){
    const z=parseFloat(document.getElementById('oval-zim').value);
    const c=parseFloat(document.getElementById('oval-cie').value);
    photos.woda[saveHouse][selMeter.kw]={
      dataUrl:pendingUrl||null,
      zimna:isNaN(z)?null:z,
      ciepla:isNaN(c)?null:c
    };
  } else {
    const v=parseFloat(document.getElementById('oval-main').value);
    photos[curType][saveHouse][selMeter.kw]={
      dataUrl:pendingUrl||null,
      val:isNaN(v)?null:v
    };
  }

  lastSaved={type:curType,house:saveHouse,kw:selMeter.kw};
  const savedData=photos[lastSaved.type][lastSaved.house][lastSaved.kw];

  document.getElementById('cpanel').className='cpanel';
  selMeter=null;pendingUrl=null;

  // Show share card only if photo was taken
  if(savedData.dataUrl){
    const fname=getFilename(lastSaved.type,lastSaved.house,lastSaved.kw);
    document.getElementById('share-card-file').textContent=fname;
    document.getElementById('share-card').style.display='block';
    setTimeout(()=>document.getElementById('share-card').scrollIntoView({behavior:'smooth',block:'nearest'}),80);
  }

  renderMeters();
  updateBadges();
}

function cancelPhoto(){
  document.getElementById('cpanel').className='cpanel';
  document.getElementById('share-card').style.display='none';
  selMeter=null;pendingUrl=null;
}

// ── INIT ──────────────────────────────────────────────────────────────
document.getElementById('hdate').textContent=
  new Date().toLocaleDateString('pl-PL',{day:'2-digit',month:'long',year:'numeric'});
switchType('gaz');
</script>
