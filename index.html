<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Счётчики газа</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
:root{--bg:#0d0f0e;--sf:#161a17;--sf2:#1e2420;--ac:#4ade80;--ac2:#22c55e;--tx:#e2e8f0;--tx2:#94a3b8;--bd:#2d3748;--red:#f87171;--yw:#fbbf24;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;max-width:500px;margin:0 auto;padding-bottom:60px;}
header{padding:16px 20px 12px;border-bottom:1px solid var(--bd);background:var(--sf);}
header h1{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--ac);letter-spacing:.15em;text-transform:uppercase;}
header p{font-size:11px;color:var(--tx2);margin-top:3px;font-family:'IBM Plex Mono',monospace;}
.prog{display:flex;gap:4px;padding:10px 20px;background:var(--sf);border-bottom:1px solid var(--bd);}
.ps{flex:1;height:3px;background:var(--bd);border-radius:2px;transition:background .3s;}
.ps.done{background:var(--ac2)}.ps.act{background:var(--ac)}
.sec{padding:18px 20px;}
.stitle{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--tx2);text-transform:uppercase;margin-bottom:12px;}
.mcard{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;transition:border-color .15s,background .15s;}
.mcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#4a5568;transition:background .2s;}
.mcard.sel{border-color:var(--ac);background:#0f2318}.mcard.sel::before{background:var(--ac)}
.mcard.done{border-color:#1e4d2b}.mcard.done::before{background:var(--ac2)}
.mi{width:38px;height:38px;background:var(--sf2);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px;}
.mcard.done .mi{background:#0f2318}
.minfo{flex:1;min-width:0}
.mhouse{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;}
.mser{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx2);margin-top:2px}
.mbadge{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:3px 8px;border-radius:6px;background:var(--sf2);color:var(--tx2);flex-shrink:0;}
.mcard.done .mbadge{background:#0f2318;color:var(--ac)}
.cpanel{display:none;background:var(--sf);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-top:12px;}
.cpanel.vis{display:block}
.chdr{padding:10px 14px;border-bottom:1px solid var(--bd);font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ac);}
.cbody{padding:14px;display:flex;flex-direction:column;gap:10px;}
.photo-area{width:100%;height:160px;background:var(--sf2);border:2px dashed var(--bd);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s;}
.photo-area:active{border-color:var(--ac);}
.photo-area.has-photo{border-style:solid;border-color:var(--ac2);}
.photo-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.photo-area .ov{position:relative;z-index:2;text-align:center;padding:8px;}
.photo-area .ov span{display:block;font-size:28px;line-height:1;}
.photo-area .ov p{font-size:12px;color:var(--tx2);margin-top:6px;}
.photo-area.has-photo .ov p{color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9);font-weight:500;}
.obox{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:12px;display:none;}
.obox.vis{display:block}
.olbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;}
.orow{display:flex;align-items:center;gap:8px;}
.oval{flex:1;padding:10px;border-radius:8px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;text-align:center;width:100%;}
.oval:focus{outline:none;border-color:var(--ac);}
.ounit{font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--tx2);}
.ost{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:7px 10px;border-radius:6px;margin-top:8px;text-align:center;display:none;}
.ost.vis{display:block}
.ost.scan{background:#3d2f0a;color:var(--yw);}
.ost.ok{background:#0f2318;color:var(--ac);}
.ost.err{background:#2d1212;color:var(--red);}
.row{display:flex;gap:8px;}
.btn{flex:1;padding:13px;border-radius:8px;border:1px solid var(--bd);background:var(--sf2);color:var(--tx);font-family:'IBM Plex Mono',monospace;font-size:13px;cursor:pointer;text-align:center;transition:all .15s;-webkit-appearance:none;display:block;width:100%;}
.btn:active{transform:scale(.97);}
.btn-g{background:var(--ac);color:#0d1f14;border-color:var(--ac);font-weight:600;}
.btn-g:active{background:var(--ac2);}
.btn-g:disabled{opacity:.4;pointer-events:none;}
.btn-r{border-color:#4a1c1c;color:var(--red);}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--bd);margin-top:8px;}
table{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:11px;}
th{background:var(--sf2);padding:8px;color:var(--tx2);font-weight:500;border-bottom:1px solid var(--bd);white-space:nowrap;text-align:center;}
th:first-child{text-align:left;}
td{padding:7px 8px;border-bottom:1px solid #1e2420;color:var(--tx);text-align:center;white-space:nowrap;}
td:first-child{text-align:left;color:var(--tx2);font-size:10px;}
tr.nr td{color:var(--ac);font-weight:600;}
tr.nr td:first-child{color:var(--ac2);}
tr:last-child td{border-bottom:none;}
.spanel{display:none;padding:18px 20px;}
.spanel.vis{display:block;}
.fitem{display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;margin-bottom:7px;}
.fdot{width:7px;height:7px;border-radius:50%;background:var(--ac);flex-shrink:0;}
.fn{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--tx);flex:1;}
.fsz{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx2);}
.smsg{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:10px 13px;border-radius:8px;text-align:center;display:none;margin-top:10px;line-height:1.6;}
.smsg.vis{display:block;}
.smsg.ok{background:#0f2318;color:var(--ac);border:1px solid #1e4d2b;}
.smsg.err{background:#2d1212;color:var(--red);border:1px solid #4a1c1c;}
.smsg.info{background:#3d2f0a;color:var(--yw);border:1px solid #5a4510;}
.chip{display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--sf2);color:var(--tx2);border:1px solid var(--bd);margin-bottom:14px;}
.chip b{color:var(--ac);}
.gdrive-box{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px;margin:14px 0;}
.gdrive-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--tx2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;}
.gdrive-status{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--tx2);margin-bottom:10px;}
.gdrive-status.connected{color:var(--ac);}
</style>
</head>
<body>

<header>
  <h1>⚡ Счётчики газа</h1>
  <p id="hdate"></p>
</header>
<div class="prog">
  <div class="ps" id="p1"></div><div class="ps" id="p2"></div>
  <div class="ps" id="p3"></div><div class="ps" id="p4"></div>
</div>

<input type="file" id="fileinput" accept="image/*" capture="environment"
  style="position:fixed;top:-9999px;left:-9999px;opacity:0;width:1px;height:1px;">

<!-- METERS -->
<div class="sec" id="msec">
  <div class="stitle">Выберите счётчик</div>
  <div class="chip">Готово: <b id="dcnt">0</b> / 4</div>
  <div id="mlist"></div>

  <div class="cpanel" id="cpanel">
    <div class="chdr" id="chdr">—</div>
    <div class="cbody">
      <div class="photo-area" id="photoarea" onclick="openCamera()">
        <div class="ov"><span>📷</span><p>Нажмите для фото</p></div>
      </div>
      <div class="obox" id="obox">
        <div class="olbl">Показание (м³) — проверьте и исправьте</div>
        <div class="orow">
          <input type="number" class="oval" id="oval" placeholder="—" inputmode="numeric" pattern="[0-9]*">
          <span class="ounit">м³</span>
        </div>
        <div class="ost" id="ost"></div>
      </div>
      <div class="row">
        <button class="btn btn-r" onclick="cancelPhoto()">Отмена</button>
        <button class="btn btn-g" id="savebtn" disabled onclick="confirmPhoto()">Сохранить ✓</button>
      </div>
    </div>
  </div>

  <div style="margin-top:16px;">
    <button class="btn btn-g" id="nextbtn" disabled onclick="showSummary()">Создать архив →</button>
  </div>

  <div style="margin-top:24px;">
    <div class="stitle">История показаний</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Дата</th><th>Дом21</th><th>Дом19</th><th>Дом17</th><th>Дом15</th><th>Σ</th></tr></thead>
        <tbody id="histbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- SUMMARY -->
<div class="spanel" id="ssec">
  <div class="stitle">Готово к отправке</div>
  <div id="flist"></div>

  <div class="gdrive-box">
    <div class="gdrive-lbl">Google Drive → turystyczna777@gmail.com</div>
    <div class="gdrive-status" id="gdrive-status">⬤ Не подключено</div>
    <button class="btn btn-g" id="gauth-btn" onclick="signInGoogle()" style="margin-bottom:8px;">🔑 Войти через Google</button>
    <button class="btn btn-g" id="upload-btn" disabled onclick="uploadToDrive()">📤 Загрузить в Drive + отправить письмо</button>
  </div>

  <div class="smsg" id="smsg"></div>
  <button class="btn" style="margin-top:14px;" onclick="resetApp()">← Сначала</button>
</div>

<script>
const CLIENT_ID = '705377688798-5dqufekeb8050gmqtl6fph5ierfp3ftb.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/gmail.send';
const EMAIL = 'turystyczna777@gmail.com';

const METERS = [
  {id:1, house:'Дом 21', short:'dom21', serial:'282405307798'},
  {id:2, house:'Дом 19', short:'dom19', serial:'282405307802'},
  {id:3, house:'Дом 17', short:'dom17', serial:'282405307754'},
  {id:4, house:'Дом 15', short:'dom15', serial:'282405307718'},
];
const HISTORY = [
  {date:'2025-10-01', v:[719,444,162,92]},
  {date:'2025-12-31', v:[744,467,258,125]},
  {date:'2026-01-24', v:[851,515,380,130]},
  {date:'2026-01-30', v:[911,535,402,141]},
  {date:'2026-03-03', v:[1080,711,445,338]},
  {date:'2026-04-01', v:[1150,760,519,404]},
  {date:'2026-05-04', v:[1222,810,589,459]},
];

let photos = {}, selMeter = null, pendingUrl = null;
let accessToken = null;

// ── Google Auth ──────────────────────────────────────────────────────
function signInGoogle() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) { showMsg('Ошибка входа: ' + resp.error, 'err'); return; }
      accessToken = resp.access_token;
      document.getElementById('gdrive-status').textContent = '✅ Подключено';
      document.getElementById('gdrive-status').className = 'gdrive-status connected';
      document.getElementById('gauth-btn').textContent = '✅ Google подключён';
      document.getElementById('gauth-btn').disabled = true;
      document.getElementById('upload-btn').disabled = false;
    }
  });
  client.requestAccessToken();
}

// ── Upload to Drive + send Gmail ─────────────────────────────────────
async function uploadToDrive() {
  const btn = document.getElementById('upload-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Создаём архив...';
  showMsg('⏳ Создаём ZIP архив...', 'info');

  try {
    // Build ZIP
    const zip = new JSZip();
    METERS.forEach(m => {
      const p = photos[m.id];
      if (!p) return;
      zip.file(fileName(m), p.dataUrl.split(',')[1], {base64: true});
    });
    const month = getMonth();
    zip.file('schetciki_' + month + '.csv', buildCSV());
    const zipBlob = await zip.generateAsync({type: 'blob'});
    const arcName = 'schetciki_gaz_' + month + '.zip';

    showMsg('⏳ Загружаем в Google Drive...', 'info');

    // Upload to Drive
    const metadata = { name: arcName, mimeType: 'application/zip' };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
    form.append('file', zipBlob);

    const uploadResp = await fetch(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink',
      { method: 'POST', headers: { Authorization: 'Bearer ' + accessToken }, body: form }
    );
    const uploadData = await uploadResp.json();
    if (!uploadData.id) throw new Error('Upload failed: ' + JSON.stringify(uploadData));

    const fileId = uploadData.id;

    // Share file with email
    await fetch('https://www.googleapis.com/drive/v3/files/' + fileId + '/permissions', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ role: 'reader', type: 'user', emailAddress: EMAIL })
    });

    // Get shareable link
    const linkResp = await fetch('https://www.googleapis.com/drive/v3/files/' + fileId + '?fields=webViewLink', {
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    const linkData = await linkResp.json();
    const fileLink = linkData.webViewLink || 'https://drive.google.com/file/d/' + fileId;

    showMsg('⏳ Отправляем письмо...', 'info');

    // Send Gmail
    const vals = METERS.map(m => photos[m.id] ? m.house + ': ' + photos[m.id].val + ' м³' : '').join('\n');
    const emailBody =
      'Добрый день!\n\n' +
      'Показания счётчиков газа за ' + month + ':\n' + vals +
      '\n\nАрхив в Google Drive:\n' + fileLink +
      '\n\nФайл: ' + arcName;

    const emailLines = [
      'To: ' + EMAIL,
      'Subject: =?UTF-8?B?' + btoa(unescape(encodeURIComponent('Счётчики газа — ' + month))) + '?=',
      'MIME-Version: 1.0',
      'Content-Type: text/plain; charset=utf-8',
      'Content-Transfer-Encoding: base64',
      '',
      btoa(unescape(encodeURIComponent(emailBody)))
    ].join('\n');

    const encoded = btoa(emailLines).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');

    const gmailResp = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ raw: encoded })
    });

    if (gmailResp.ok) {
      showMsg('✅ Архив загружен в Drive!\n✅ Письмо отправлено на ' + EMAIL + '\n\n📎 ' + arcName, 'ok');
      btn.textContent = '✅ Отправлено!';
    } else {
      const errData = await gmailResp.json();
      // Gmail failed but Drive worked — still success
      showMsg('✅ Архив в Drive: ' + fileLink + '\n\n⚠️ Письмо не отправлено — недостаточно прав Gmail. Отправьте ссылку вручную.', 'ok');
      btn.textContent = '✅ Drive готов';
    }

  } catch(e) {
    showMsg('❌ Ошибка: ' + e.message, 'err');
    btn.disabled = false;
    btn.textContent = '📤 Попробовать снова';
  }
}

// ── Camera ───────────────────────────────────────────────────────────
const fileInput = document.getElementById('fileinput');
function openCamera() { fileInput.value = ''; fileInput.click(); }

fileInput.addEventListener('change', function() {
  const file = this.files && this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    pendingUrl = e.target.result;
    const pa = document.getElementById('photoarea');
    pa.className = 'photo-area has-photo';
    pa.innerHTML = '<img src="' + pendingUrl + '"><div class="ov"><p>📸 Готово — нажмите для переснимки</p></div>';
    document.getElementById('obox').className = 'obox vis';
    document.getElementById('oval').value = '';
    document.getElementById('savebtn').disabled = true;
    runOCR(pendingUrl);
  };
  reader.readAsDataURL(file);
});

async function runOCR(dataUrl) {
  setOst('scan', '⏳ Считываем показание...');
  try {
    const base64 = dataUrl.split(',')[1];
    const mtype = dataUrl.split(';')[0].split(':')[1];
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 100,
        messages: [{role:'user', content:[
          {type:'image', source:{type:'base64', media_type:mtype, data:base64}},
          {type:'text', text:'На фото счётчик газа. Найди показание в м³. Ответь ТОЛЬКО целым числом без единиц. Пример: 1222'}
        ]}]
      })
    });
    const data = await resp.json();
    const raw = (data.content && data.content[0] && data.content[0].text) || '';
    const num = parseInt(raw.replace(/[^\d]/g, ''));
    if (!isNaN(num) && num > 0) {
      document.getElementById('oval').value = num;
      setOst('ok', '✅ Считано: ' + num + ' м³ — проверьте!');
      document.getElementById('savebtn').disabled = false;
    } else throw new Error();
  } catch(e) {
    setOst('err', '⚠️ Не удалось считать — введите вручную');
    document.getElementById('savebtn').disabled = false;
  }
}

function setOst(cls, txt) {
  const el = document.getElementById('ost');
  el.className = 'ost vis ' + cls;
  el.textContent = txt;
}

document.getElementById('oval').addEventListener('input', function() {
  document.getElementById('savebtn').disabled = !this.value;
});

// ── Meter logic ──────────────────────────────────────────────────────
function selectMeter(m) {
  selMeter = m; pendingUrl = null;
  document.getElementById('chdr').textContent = '📍 ' + m.house + ' (' + m.serial + ')';
  document.getElementById('cpanel').className = 'cpanel vis';
  const pa = document.getElementById('photoarea');
  pa.className = 'photo-area';
  pa.innerHTML = '<div class="ov"><span>📷</span><p>Нажмите для фото</p></div>';
  document.getElementById('obox').className = 'obox';
  document.getElementById('oval').value = '';
  document.getElementById('ost').className = 'ost';
  document.getElementById('savebtn').disabled = true;
  renderMeters();
  setTimeout(() => document.getElementById('cpanel').scrollIntoView({behavior:'smooth', block:'nearest'}), 80);
}

function confirmPhoto() {
  if (!selMeter || !pendingUrl) return;
  const v = parseInt(document.getElementById('oval').value);
  if (isNaN(v) || v <= 0) { alert('Введите показание'); return; }
  photos[selMeter.id] = {meter: selMeter, dataUrl: pendingUrl, val: v};
  document.getElementById('cpanel').className = 'cpanel';
  selMeter = null; pendingUrl = null;
  renderMeters(); renderHistory();
}

function cancelPhoto() {
  document.getElementById('cpanel').className = 'cpanel';
  selMeter = null; pendingUrl = null;
  renderMeters();
}

// ── Render ───────────────────────────────────────────────────────────
function getMonth() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function fileName(m) { return m.short + '_' + getMonth() + '.jpg'; }

function renderMeters() {
  const list = document.getElementById('mlist');
  list.innerHTML = '';
  METERS.forEach(m => {
    const done = !!photos[m.id], sel = selMeter && selMeter.id === m.id;
    const d = document.createElement('div');
    d.className = 'mcard' + (sel ? ' sel' : '') + (done ? ' done' : '');
    d.innerHTML =
      '<div class="mi">' + (done ? '✅' : '🔧') + '</div>' +
      '<div class="minfo"><div class="mhouse">' + m.house + '</div><div class="mser">' + m.serial + '</div></div>' +
      '<div class="mbadge">' + (done ? photos[m.id].val + ' м³' : 'газ') + '</div>';
    d.onclick = () => selectMeter(m);
    list.appendChild(d);
  });
  const cnt = Object.keys(photos).length;
  document.getElementById('dcnt').textContent = cnt;
  document.getElementById('nextbtn').disabled = cnt < 4;
  METERS.forEach((m, i) => {
    const el = document.getElementById('p' + (i+1));
    el.className = 'ps' + (photos[m.id] ? ' done' : (selMeter && selMeter.id === m.id ? ' act' : ''));
  });
}

function renderHistory() {
  const tb = document.getElementById('histbody');
  tb.innerHTML = '';
  const rows = [...HISTORY];
  if (Object.keys(photos).length === 4) {
    rows.push({date: new Date().toISOString().slice(0,10), v: METERS.map(m => photos[m.id] ? photos[m.id].val : null), isNew: true});
  }
  rows.forEach(r => {
    const sum = r.v.reduce((a,b) => a + (b||0), 0);
    const tr = document.createElement('tr');
    if (r.isNew) tr.className = 'nr';
    tr.innerHTML = '<td>' + r.date + '</td>' + r.v.map(x => '<td>' + (x != null ? x : '—') + '</td>').join('') + '<td>' + sum + '</td>';
    tb.appendChild(tr);
  });
}

function buildCSV() {
  let csv = '\uFEFF' + 'Дата,Дом 21,Дом 19,Дом 17,Дом 15,Сумма\n';
  const rows = [...HISTORY];
  if (Object.keys(photos).length === 4) rows.push({date: new Date().toISOString().slice(0,10), v: METERS.map(m => photos[m.id] ? photos[m.id].val : '')});
  rows.forEach(r => {
    const sum = r.v.reduce((a,b) => a + (parseInt(b)||0), 0);
    csv += r.date + ',' + r.v.join(',') + ',' + sum + '\n';
  });
  return csv;
}

function showSummary() {
  document.getElementById('msec').style.display = 'none';
  document.getElementById('ssec').className = 'spanel vis';
  const fl = document.getElementById('flist');
  fl.innerHTML = '';
  METERS.forEach(m => {
    const p = photos[m.id]; if (!p) return;
    const kb = Math.round(p.dataUrl.length * .75 / 1024);
    fl.innerHTML += '<div class="fitem"><div class="fdot"></div><div class="fn">' + fileName(m) + '<br><span style="font-size:9px;opacity:.6">' + p.val + ' м³</span></div><div class="fsz">' + kb + ' KB</div></div>';
  });
  fl.innerHTML += '<div class="fitem"><div class="fdot" style="background:var(--yw)"></div><div class="fn">schetciki_' + getMonth() + '.csv</div><div class="fsz">CSV</div></div>';
}

function showMsg(t, tp) {
  const el = document.getElementById('smsg');
  el.textContent = t; el.className = 'smsg vis ' + tp;
  el.style.whiteSpace = 'pre-line';
}

function resetApp() {
  photos = {}; selMeter = null; pendingUrl = null;
  document.getElementById('msec').style.display = 'block';
  document.getElementById('ssec').className = 'spanel';
  document.getElementById('cpanel').className = 'cpanel';
  document.getElementById('smsg').className = 'smsg';
  document.getElementById('upload-btn').disabled = !accessToken;
  document.getElementById('upload-btn').textContent = '📤 Загрузить в Drive + отправить письмо';
  renderMeters(); renderHistory();
}

document.getElementById('hdate').textContent = new Date().toLocaleDateString('ru-RU', {day:'2-digit', month:'long', year:'numeric'});
renderMeters(); renderHistory();
</script>
